# models/schema.yml
version: 2

sources:
  - name: snowflake
    database: analytics
    schema: public
    tables:
      - name: sales_data

models:
  - name: customer_sales
    description: "Total sales amount per customer. Built from source: neon_source.sales_data"
    columns:
      - name: customer_id
        description: "Customer identifier (aggregated level)."
        tests:
          - not_null  
          - unique
      - name: total_sales
        description: "Total sales amount (sum of amount) for each customer."
        tests:
          - not_null
          - no_negative

  - name: orders_per_month
    description: "Monthly order counts derived from sales_data (one row per month)."
    columns:
      - name: order_month
        description: "First day of the month representing the month window (YYYY-MM-DD)."
        tests:
          - not_null
      - name: orders_count
        description: "Number of orders in the month."
        tests:
          - not_null
          - no_negative

  - name: orders_per_month_incremental
    description: "Incremental version of monthly order counts. Appends new data when sales_data refreshes."
    columns:
      - name: order_month
        description: "Month of the orders (YYYY-MM-DD)."
        tests:
          - not_null
          - unique
      - name: orders_count
        description: "Number of orders aggregated incrementally."
        tests:
          - not_null
          - expression_is_non_negative


